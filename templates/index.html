<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Swing Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg:      #0a0e17;
    --bg2:     #111827;
    --bg3:     #1a2235;
    --border:  #1e2d45;
    --accent:  #00d4aa;
    --accent2: #0ea5e9;
    --long:    #22c55e;
    --short:   #ef4444;
    --muted:   #4b6080;
    --text:    #c9d8e8;
    --text2:   #7a96b3;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    color: var(--accent); letter-spacing: .04em;
    display: flex; align-items: center; gap: 8px;
  }
  .logo::before {
    content: ''; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge-telegram {
    font-family: var(--mono); font-size: 11px;
    padding: 3px 10px; border-radius: 100px; border: 1px solid;
  }
  .badge-telegram.ok    { color: var(--long);  border-color: var(--long); }
  .badge-telegram.error { color: var(--short); border-color: var(--short); }
  #last-check { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  /* ── Layout ── */
  main {
    max-width: 1160px; margin: 0 auto;
    padding: 20px 16px;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 16px; align-items: start;
  }
  @media(max-width:800px){ main { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .card-header {
    padding: 11px 16px; background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    color: var(--accent2); letter-spacing: .08em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-body { padding: 14px 16px; }

  /* ── Perfiles guardados ── */
  .profiles-list { padding: 0; }
  .profile-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .profile-item:last-child { border-bottom: none; }
  .profile-item:hover { background: var(--bg3); }
  .profile-item.active { background: rgba(0,212,170,.06); border-left: 3px solid var(--accent); }
  .profile-enable-chk {
    cursor: pointer;
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    margin-right: 4px;
  }
  .profile-sym {
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    color: var(--text); flex: 1;
  }
  .profile-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-right: 8px; }
  .profile-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 2px 4px;
    border-radius: 3px; line-height: 1;
    transition: color .12s, background .12s;
  }
  .profile-delete:hover { color: var(--short); background: rgba(239,68,68,.1); }
  .profiles-empty {
    padding: 16px; text-align: center;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }

  /* ── Formulario ── */
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text2); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .field input[type="number"],
  .field input[type="text"],
  .field select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); font-family: var(--mono);
    font-size: 13px; padding: 7px 10px; outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent2); }
  .field select option { background: var(--bg3); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── Toggle ── */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .toggle-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .toggle { position: relative; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider {
    position: absolute; inset: 0;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 22px; cursor: pointer; transition: .2s;
  }
  .toggle .slider::before {
    content: ''; position: absolute;
    left: 3px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; background: var(--muted);
    border-radius: 50%; transition: .2s;
  }
  .toggle input:checked + .slider { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked + .slider::before { background: var(--bg); left: calc(100% - 17px); }

  /* ── Botones ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 14px; border-radius: 5px; border: none;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    cursor: pointer; transition: opacity .15s, transform .1s;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary  { background: var(--accent);  color: var(--bg); }
  .btn-scan     { background: var(--accent2); color: white; }
  .btn-danger   { background: transparent; color: var(--short); border: 1px solid rgba(239,68,68,.3); }
  .btn-test     { background: transparent; color: var(--text2); border: 1px solid var(--border); font-size: 11px; padding: 5px 10px; }
  .btn-row      { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }

  /* ── Panel señal ── */
  .signal-panel { text-align: center; padding: 20px 16px; border-bottom: 1px solid var(--border); }
  .signal-badge {
    display: inline-block; font-family: var(--mono); font-size: 20px; font-weight: 700;
    padding: 10px 36px; border-radius: 6px; letter-spacing: .1em; margin-bottom: 6px;
  }
  .signal-badge.LONG  { background: rgba(34,197,94,.12); color: var(--long);  border: 1px solid rgba(34,197,94,.3); }
  .signal-badge.SHORT { background: rgba(239,68,68,.12);  color: var(--short); border: 1px solid rgba(239,68,68,.3); }
  .signal-badge.NONE  { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .signal-ts { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  /* ── Métricas ── */
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
  .metric { padding: 12px 14px; border-right: 1px solid var(--border); }
  .metric:last-child { border-right: none; }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 3px; font-weight: 600; }
  .metric-value { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); }
  .metric-value.entry { color: var(--accent2); }
  .metric-value.stop  { color: var(--short); }
  .metric-value.tp    { color: var(--long); }

  /* ── Tendencias ── */
  .trends { display: grid; grid-template-columns: 1fr 1fr; padding: 12px 14px; gap: 10px; border-bottom: 1px solid var(--border); }
  .trend-item {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .trend-key { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .trend-val { font-family: var(--mono); font-size: 12px; font-weight: 700; }
  .trend-val.Alcista { color: var(--long); }
  .trend-val.Bajista { color: var(--short); }
  .trend-val.Neutra  { color: var(--muted); }

  /* ── Log ── */
  .log-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-dir { font-weight: 700; width: 44px; }
  .log-dir.LONG  { color: var(--long); }
  .log-dir.SHORT { color: var(--short); }
  .log-sym   { color: var(--text2); min-width: 80px; }
  .log-entry { color: var(--accent2); }
  .log-sl    { color: var(--short); }
  .log-tp    { color: var(--long); }
  .log-time  { color: var(--muted); margin-left: auto; }
  .empty-log { padding: 20px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 12px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 18px; font-family: var(--mono); font-size: 12px; color: var(--text);
    opacity: 0; transform: translateY(12px); transition: .25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { border-color: var(--long);  color: var(--long); }
  #toast.err  { border-color: var(--short); color: var(--short); }

  .right-col { display: flex; flex-direction: column; gap: 16px; }
  .left-col  { display: flex; flex-direction: column; gap: 16px; }

  .divider {
    border: none; border-top: 1px solid var(--border);
    margin: 10px 0 14px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">FOREX SWING BOT</div>
  <div class="header-right">
    <span id="last-check">—</span>
    {% if telegram_ok %}
      <span class="badge-telegram ok">✓ Telegram</span>
    {% else %}
      <span class="badge-telegram error">✗ Telegram</span>
    {% endif %}
  </div>
</header>

<main>

  <!-- ── Columna izquierda ── -->
  <div class="left-col">

    <!-- Perfiles guardados -->
    <div class="card">
      <div class="card-header">
        <span>📂 Pares guardados</span>
        <span id="profile-count" style="color:var(--muted);font-weight:400">0</span>
      </div>
      <div id="profiles-list">
        <div class="profiles-empty">Sin perfiles aún. Configura un par y guárdalo.</div>
      </div>
    </div>

    <!-- Configuración -->
    <div class="card">
      <div class="card-header">⚙ Configuración</div>
      <div class="card-body">

        <div class="toggle-row">
          <span class="toggle-label">Bot activo</span>
          <label class="toggle">
            <input type="checkbox" id="enabled" {% if config.enabled %}checked{% endif %}>
            <span class="slider"></span>
          </label>
        </div>

        <div class="field">
          <label>Par (Yahoo Finance)</label>
          <select id="symbol">
            <!-- Forex -->
            <optgroup label="Forex">
              <option value="EURUSD=X">EUR/USD (Euro / US Dollar)</option>
              <option value="GBPUSD=X">GBP/USD (British Pound / US Dollar)</option>
              <option value="USDJPY=X">USD/JPY (US Dollar / Japanese Yen)</option>
              <option value="AUDUSD=X">AUD/USD (Australian Dollar / US Dollar)</option>
              <option value="USDCAD=X">USD/CAD (US Dollar / Canadian Dollar)</option>
              <option value="USDCHF=X">USD/CHF (US Dollar / Swiss Franc)</option>
              <option value="EURGBP=X">EUR/GBP (Euro / British Pound)</option>
              <option value="EURJPY=X">EUR/JPY (Euro / Japanese Yen)</option>
              <option value="GBPJPY=X">GBP/JPY (British Pound / Japanese Yen)</option>
              <option value="AUDJPY=X">AUD/JPY (Australian Dollar / Japanese Yen)</option>
              <option value="NZDUSD=X">NZD/USD (New Zealand Dollar / US Dollar)</option>
            </optgroup>
            <!-- Crypto -->
            <optgroup label="Criptomonedas">
              <option value="BTC-USD">BTC/USD (Bitcoin)</option>
              <option value="ETH-USD">ETH/USD (Ethereum)</option>
              <option value="SOL-USD">SOL/USD (Solana)</option>
              <option value="BNB-USD">BNB/USD (Binance Coin)</option>
              <option value="XRP-USD">XRP/USD (Ripple)</option>
            </optgroup>
            <!-- Índices -->
            <optgroup label="Índices">
              <option value="^GSPC">S&P 500 (^GSPC)</option>
              <option value="^IXIC">NASDAQ (^IXIC)</option>
              <option value="^DJI">Dow Jones (^DJI)</option>
              <option value="^IBEX">IBEX 35 (^IBEX)</option>
              <option value="^GDAXI">DAX (^GDAXI)</option>
              <option value="^FTSE">FTSE 100 (^FTSE)</option>
              <option value="^N225">Nikkei 225 (^N225)</option>
            </optgroup>
            <optgroup id="custom-optgroup" label="Personalizados"></optgroup>
            <option value="__custom__">➕ Añadir otro par / ticker...</option>
          </select>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Timeframe base</label>
            <select id="timeframe">
              {% for val, label in tf_options %}
                <option value="{{ val }}" {% if config.timeframe == val %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="field">
            <label>Intervalo (min)</label>
            <input type="number" id="interval" value="{{ config.interval }}" min="5" max="1440">
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>EMA rápida</label>
            <input type="number" id="ema_fast" value="{{ config.ema_fast }}" min="1">
          </div>
          <div class="field">
            <label>EMA lenta</label>
            <input type="number" id="ema_slow" value="{{ config.ema_slow }}" min="1">
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>RSI</label>
            <input type="number" id="rsi_len" value="{{ config.rsi_len }}" min="1">
          </div>
          <div class="field">
            <label>ATR</label>
            <input type="number" id="atr_len" value="{{ config.atr_len }}" min="1">
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Stop × ATR</label>
            <input type="number" id="stop_atr" value="{{ config.stop_atr }}" step="0.1" min="0.1">
          </div>
          <div class="field">
            <label>TP × ATR</label>
            <input type="number" id="tp_atr" value="{{ config.tp_atr }}" step="0.1" min="0.1">
          </div>
        </div>

        <div class="toggle-row">
          <span class="toggle-label">Filtro marco mayor</span>
          <label class="toggle">
            <input type="checkbox" id="use_htf" {% if config.use_htf %}checked{% endif %}>
            <span class="slider"></span>
          </label>
        </div>

        <div class="field">
          <label>Marco mayor (HTF)</label>
          <select id="htf">
            {% for val, label in htf_options %}
              <option value="{{ val }}" {% if config.htf == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <hr class="divider">

        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveConfig()">💾 Guardar par</button>
          <button class="btn btn-scan"    onclick="scanNow()">▶ Escanear ahora</button>
        </div>
        <div class="btn-row" style="margin-top:8px">
          <button class="btn btn-test" onclick="testTelegram()">📨 Probar Telegram</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Columna derecha ── -->
  <div class="right-col">

    <!-- Señales de los pares analizados -->
    <div id="signals-container" style="display: flex; flex-direction: column; gap: 16px;"></div>

    <!-- Historial -->
    <div class="card">
      <div class="card-header">📋 Últimas señales (todos los pares)</div>
      <div id="log-container">
        <div class="empty-log">Sin señales aún.</div>
      </div>
    </div>

  </div>
</main>

<div id="toast"></div>

<script>
// ── Estado local ───────────────────────────────────────────────────────────────
let activeSymbol = '{{ config.symbol }}';

// ── Utilidades ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2800);
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES') + ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

// ── Render perfiles ────────────────────────────────────────────────────────────
function renderProfiles(profiles) {
  const container = document.getElementById('profiles-list');
  const counter   = document.getElementById('profile-count');
  counter.textContent = profiles.length;

  if (!profiles.length) {
    container.innerHTML = '<div class="profiles-empty">Sin perfiles aún. Configura un par y guárdalo.</div>';
    return;
  }

  const tfLabel = { '15':'15m', '30':'30m', '60':'1h', '240':'4h', 'D':'D', 'W':'W' };
  const htfLabel = { '60':'1h', '240':'4h', 'D':'D', 'W':'W' };

  container.innerHTML = profiles.map(p => `
    <div class="profile-item ${p.symbol === activeSymbol ? 'active' : ''}"
         onclick="loadProfile('${p.symbol}')">
      <input type="checkbox" class="profile-enable-chk" 
             ${p.enabled ? 'checked' : ''} 
             onclick="toggleProfileEnable(event, '${p.symbol}')"
             title="Activar para análisis automático">
      <span class="profile-sym">${p.symbol.replace('=X','').replace('=','')}</span>
      <span class="profile-meta">${tfLabel[p.timeframe] || p.timeframe} · HTF ${htfLabel[p.htf] || p.htf}</span>
      <button class="profile-delete" title="Eliminar" onclick="deleteProfile(event, '${p.symbol}')">✕</button>
    </div>
  `).join('');
}

async function toggleProfileEnable(event, symbol) {
  event.stopPropagation(); // Evitar cambiar de par activo al pulsar el checkbox
  try {
    const r = await fetch('/api/profile/toggle_enable', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol })
    });
    const d = await r.json();
    if (d.ok) {
      if (d.profiles) renderProfiles(d.profiles);
      if (d.config) applyConfigToForm(d.config);
      toast(`✓ Configuración de ${symbol} actualizada`, 'ok');
    }
  } catch(e) {
    toast('✗ Error de red', 'err');
  }
}

// ── Render señal ───────────────────────────────────────────────────────────────
// ── Render señales de todos los pares activos ──────────────────────────────────
function renderSignals(profiles, lastSignals, lastChecks) {
  const container = document.getElementById('signals-container');
  if (!container) return;

  const enabledProfiles = profiles.filter(p => p.enabled);

  if (!enabledProfiles.length) {
    container.innerHTML = `
      <div class="card">
        <div class="card-header">📡 Señales de análisis</div>
        <div style="padding: 24px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 12px;">
          Sin pares marcados para analizar. Marca los checkboxes en "Pares guardados" para iniciar el escaneo.
        </div>
      </div>
    `;
    return;
  }

  container.innerHTML = enabledProfiles.map(p => {
    const symbol = p.symbol;
    const sig = lastSignals[symbol];
    const checkTime = lastChecks[symbol];
    
    const direction = sig ? sig.direction : 'NONE';
    const badgeText = direction === 'NONE' ? 'ESPERANDO' : direction;
    const timestampText = checkTime ? 'Último escaneo: ' + fmtTime(checkTime) : 'Esperando primer escaneo...';
    
    const entry = (sig && direction !== 'NONE') ? sig.entry_price : '—';
    const sl = (sig && direction !== 'NONE') ? sig.stop_loss : '—';
    const tp = (sig && direction !== 'NONE') ? sig.take_profit : '—';
    
    const rsi = sig ? (sig.rsi ?? '—') : '—';
    const atr = sig ? (sig.atr ?? '—') : '—';
    
    const trendH1 = sig ? (sig.trend_h1 ?? '—') : '—';
    const trendHTF = sig ? (sig.trend_htf ?? '—') : '—';
    const htfLabel = sig ? (sig.htf_label ?? '') : '';

    return `
      <div class="card">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
          <span>📡 Análisis: <b>${symbol.replace('=X','').replace('=','')}</b></span>
          <span style="color:var(--accent2); font-family:var(--mono); font-size:11px;">TF: ${p.timeframe}m | HTF: ${p.htf}</span>
        </div>

        <div class="signal-panel">
          <div class="signal-badge ${direction}">${badgeText}</div>
          <div class="signal-ts">${timestampText}</div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-label">Entrada</div>
            <div class="metric-value entry">${entry}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Stop Loss</div>
            <div class="metric-value stop">${sl}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Take Profit</div>
            <div class="metric-value tp">${tp}</div>
          </div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-label">RSI</div>
            <div class="metric-value">${rsi}</div>
          </div>
          <div class="metric">
            <div class="metric-label">ATR</div>
            <div class="metric-value">${atr}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Periodicidad</div>
            <div class="metric-value" style="font-size:11px;">Cada ${p.interval || 30} min</div>
          </div>
        </div>

        <div class="trends">
          <div class="trend-item">
            <span class="trend-key">Tendencia base</span>
            <span class="trend-val ${trendH1}">${trendH1}</span>
          </div>
          <div class="trend-item">
            <span class="trend-key">HTF (${htfLabel || p.htf})</span>
            <span class="trend-val ${trendHTF}">${trendHTF}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderLog(log) {
  const container = document.getElementById('log-container');
  if (!log || !log.length) {
    container.innerHTML = '<div class="empty-log">Sin señales aún.</div>';
    return;
  }
  container.innerHTML = log.map(s => `
    <div class="log-item">
      <span class="log-dir ${s.direction}">${s.direction}</span>
      <span class="log-sym">${(s.symbol || '').replace('=X','').replace('=','')}</span>
      <span class="log-entry">${s.entry_price}</span>
      <span>SL <span class="log-sl">${s.stop_loss}</span></span>
      <span>TP <span class="log-tp">${s.take_profit}</span></span>
      <span class="log-time">${fmtTime(s.timestamp)}</span>
    </div>
  `).join('');
}

// ── Gestión del valor del par (Select / Custom) ───────────────────────────────
function setSymbolValue(symbol) {
  const sel = document.getElementById('symbol');
  if (!sel) return;
  
  // Buscar si la opción ya existe
  let exists = false;
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === symbol) {
      exists = true;
      break;
    }
  }
  
  // Si no existe, crear la opción en el optgroup de personalizados
  if (!exists && symbol && symbol !== '__custom__') {
    const customGroup = document.getElementById('custom-optgroup');
    if (customGroup) {
      const opt = document.createElement('option');
      opt.value = symbol;
      opt.textContent = symbol + ' (Personalizado)';
      customGroup.appendChild(opt);
    }
  }
  sel.value = symbol;
}

// ── Aplicar config al formulario ───────────────────────────────────────────────
function applyConfigToForm(cfg) {
  setSymbolValue(cfg.symbol ?? '');
  document.getElementById('ema_fast').value  = cfg.ema_fast  ?? 50;
  document.getElementById('ema_slow').value  = cfg.ema_slow  ?? 200;
  document.getElementById('rsi_len').value   = cfg.rsi_len   ?? 14;
  document.getElementById('atr_len').value   = cfg.atr_len   ?? 14;
  document.getElementById('stop_atr').value  = cfg.stop_atr  ?? 1.5;
  document.getElementById('tp_atr').value    = cfg.tp_atr    ?? 3.0;
  document.getElementById('interval').value  = cfg.interval  ?? 30;
  document.getElementById('enabled').checked = cfg.enabled   ?? true;
  document.getElementById('use_htf').checked = cfg.use_htf   ?? true;

  // selects
  ['timeframe', 'htf'].forEach(id => {
    const sel = document.getElementById(id);
    const val = cfg[id];
    if (val) [...sel.options].forEach(o => o.selected = o.value === val);
  });

  activeSymbol = cfg.symbol;
}

// ── API calls ──────────────────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    document.getElementById('last-check').textContent = '↻ ' + fmtTime(new Date().toISOString());
    renderSignals(d.profiles || [], d.last_signals || {}, d.last_checks || {});
    renderLog(d.log);
    renderProfiles(d.profiles || []);
  } catch(e) {}
}

function collectConfig() {
  return {
    symbol:    document.getElementById('symbol').value.trim(),
    timeframe: document.getElementById('timeframe').value,
    ema_fast:  +document.getElementById('ema_fast').value,
    ema_slow:  +document.getElementById('ema_slow').value,
    rsi_len:   +document.getElementById('rsi_len').value,
    atr_len:   +document.getElementById('atr_len').value,
    stop_atr:  +document.getElementById('stop_atr').value,
    tp_atr:    +document.getElementById('tp_atr').value,
    use_htf:   document.getElementById('use_htf').checked,
    htf:       document.getElementById('htf').value,
    interval:  +document.getElementById('interval').value,
    enabled:   document.getElementById('enabled').checked,
  };
}

async function saveConfig({ silent = false } = {}) {
  const cfg = collectConfig();
  if (!cfg.symbol) { toast('✗ Introduce un par válido', 'err'); return false; }
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cfg)
    });
    const d = await r.json();
    if (d.profiles) renderProfiles(d.profiles);
    activeSymbol = cfg.symbol;
    if (!silent) toast(`✓ "${cfg.symbol}" guardado`, 'ok');
    return d.ok;
  } catch(e) {
    if (!silent) toast('✗ Error de red', 'err');
    return false;
  }
}

async function loadProfile(symbol) {
  try {
    const r = await fetch('/api/profile/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol })
    });
    const d = await r.json();
    if (d.ok) {
      applyConfigToForm(d.config);
      if (d.profiles) renderProfiles(d.profiles);
      toast(`✓ Par cargado: ${symbol}`, 'ok');
    }
  } catch(e) { toast('✗ Error de red', 'err'); }
}

async function deleteProfile(event, symbol) {
  event.stopPropagation();
  if (!confirm(`¿Eliminar el perfil de ${symbol}?`)) return;
  try {
    const r = await fetch('/api/profile/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol })
    });
    const d = await r.json();
    if (d.profiles) renderProfiles(d.profiles);
    if (d.config)   applyConfigToForm(d.config);
    toast(`✓ Perfil eliminado: ${symbol}`, 'ok');
  } catch(e) { toast('✗ Error de red', 'err'); }
}

async function scanNow() {
  toast('Guardando y escaneando…');
  const saved = await saveConfig({ silent: true });
  if (!saved) { toast('✗ No se pudo guardar la config', 'err'); return; }
  try {
    const r = await fetch('/api/scan_now', { method: 'POST' });
    const d = await r.json();
    await fetchStatus();
    toast('✓ Escaneo completado', 'ok');
  } catch(e) { toast('✗ Error de red', 'err'); }
}

async function testTelegram() {
  toast('Enviando prueba…');
  try {
    const r = await fetch('/api/test_telegram', { method: 'POST' });
    const d = await r.json();
    toast(d.ok ? '✓ Mensaje enviado a Telegram' : '✗ Revisa el .env', d.ok ? 'ok' : 'err');
  } catch(e) { toast('✗ Error de red', 'err'); }
}

// Arranque
setSymbolValue(activeSymbol);

document.getElementById('symbol').addEventListener('change', function(e) {
  if (this.value === '__custom__') {
    const customSymbol = prompt('Introduce el ticker de Yahoo Finance (ej. USDMXN=X, GBPJPY=X, BTC-USD):');
    if (customSymbol && customSymbol.trim()) {
      const cleanSymbol = customSymbol.trim().toUpperCase();
      setSymbolValue(cleanSymbol);
      activeSymbol = cleanSymbol;
    } else {
      // Si cancela, revertimos al par activo anterior
      this.value = activeSymbol;
    }
  } else {
    activeSymbol = this.value;
  }
});

fetchStatus();
setInterval(fetchStatus, 30000);
</script>
